# Smian's Blog - Zola config
title = "Smian"
base_url = "https://chensimian.github.io/"

compile_sass = true
ignored_content = ["README.md"]
build_search_index = true
default_language = "en"

[markdown]
[markdown.highlighting]
theme = "github-light"
style = "inline"

[extra]
katex_enable = true

[[taxonomies]]
name = "tags"
slug = "tags"

[[taxonomies]]
name = "categories"
slug = "categories"

[extra.social]
github = "chensimian"

[extra.show]
links = true
tags = true

[languages.en]
generate_feeds = true
description = "Stay hungry, stay foolish."

[languages.en.translations]
about = "About"
home = "Home"
tags = "Tags"
archive = "Archive"
links = "Links"
date_format = "%Y-%m-%d"
next_page = "Next Page"
last_page = "Last Page"
